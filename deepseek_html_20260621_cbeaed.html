<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Конверт с вопросом</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(145deg, #f5f0eb 0%, #e8dfd7 100%);
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
    }

    .envelope {
      position: relative;
      width: 360px;
      height: 260px;
      perspective: 1200px;
      cursor: pointer;
      transition: transform 0.25s ease;
    }

    .envelope:hover {
      transform: scale(1.02);
    }

    .envelope-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.7s cubic-bezier(0.23, 1, 0.32, 1);
      transform-style: preserve-3d;
      transform: rotateX(0deg);
    }

    .envelope.open .envelope-inner {
      transform: rotateX(180deg);
    }

    .envelope-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      background: #fff9f2;
      border-radius: 32px 32px 20px 20px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15), 0 8px 20px rgba(0, 0, 0, 0.05);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 28px 24px;
      transform: rotateX(180deg);
      border: 1px solid rgba(255, 215, 175, 0.3);
      background-image: radial-gradient(circle at 30% 30%, rgba(255, 235, 210, 0.4) 0%, transparent 60%);
    }

    .envelope-back h2 {
      font-size: 1.7rem;
      font-weight: 500;
      color: #4a3729;
      margin-bottom: 28px;
      text-align: center;
      letter-spacing: -0.3px;
      line-height: 1.3;
      background: linear-gradient(135deg, #5e3f2b, #3f2c1e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .button-group {
      display: flex;
      gap: 28px;
      align-items: center;
      position: relative;
      width: 100%;
      justify-content: center;
    }

    .btn {
      padding: 12px 32px;
      border: none;
      border-radius: 60px;
      font-size: 1.4rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.05);
      letter-spacing: 0.5px;
      min-width: 100px;
    }

    .btn-yes {
      background: #7cb083;
      color: white;
      box-shadow: 0 8px 18px rgba(92, 156, 104, 0.3);
      position: relative;
      z-index: 1;
    }

    .btn-yes:hover {
      background: #6a9f73;
      transform: translateY(-3px);
      box-shadow: 0 12px 24px rgba(92, 156, 104, 0.4);
    }

    .btn-no {
      background: #e6d5c4;
      color: #4a3729;
      position: relative;
      z-index: 2;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
    }

    .btn-no:hover {
      background: #dbc8b4;
    }

    .btn-no.flying {
      transition: transform 0.4s cubic-bezier(0.34, 1.2, 0.64, 1), opacity 0.3s ease;
      pointer-events: auto;
      cursor: pointer;
    }

    .btn-no.collapsed {
      transform: scale(0) rotate(180deg) !important;
      opacity: 0 !important;
      pointer-events: none;
      transition: all 0.3s cubic-bezier(0.34, 1.0, 0.64, 1);
    }

    .btn-no.restored {
      transform: scale(1) rotate(0deg) !important;
      opacity: 1 !important;
      pointer-events: auto;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .envelope-front {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      background: #fcead8;
      border-radius: 32px 32px 20px 20px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.12), 0 8px 20px rgba(0, 0, 0, 0.05);
      display: flex;
      justify-content: center;
      align-items: center;
      border: 1px solid rgba(255, 215, 175, 0.5);
      background-image: linear-gradient(145deg, #fde8d4, #f5d5bb);
      transition: box-shadow 0.3s;
    }

    .envelope-front::after {
      content: "✉";
      font-size: 5rem;
      color: #b28b72;
      opacity: 0.5;
      filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.1));
      transform: rotate(-6deg);
      transition: transform 0.4s ease;
    }

    .envelope.open .envelope-front::after {
      transform: rotate(6deg) scale(0.8);
      opacity: 0.3;
    }

    .envelope-front .stamp {
      position: absolute;
      top: 20px;
      right: 24px;
      width: 48px;
      height: 56px;
      background: #f7b07c;
      border-radius: 6px 6px 12px 12px;
      opacity: 0.5;
      border: 2px dashed rgba(120, 80, 50, 0.2);
    }

    .envelope-front .stamp::after {
      content: "✧";
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100%;
      font-size: 1.8rem;
      color: #bb8b6b;
    }

    .envelope-front .line {
      position: absolute;
      background: rgba(160, 120, 90, 0.15);
      border-radius: 40px;
    }

    .line1 {
      width: 180px;
      height: 4px;
      top: 70px;
      left: 20px;
      transform: rotate(-12deg);
    }
    .line2 {
      width: 140px;
      height: 4px;
      bottom: 60px;
      right: 30px;
      transform: rotate(10deg);
    }

    @media (max-width: 500px) {
      .envelope {
        width: 300px;
        height: 220px;
      }
      .envelope-back h2 {
        font-size: 1.3rem;
        margin-bottom: 20px;
      }
      .btn {
        padding: 10px 18px;
        font-size: 1.1rem;
        min-width: 70px;
      }
      .button-group {
        gap: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="envelope" id="envelope">
    <div class="envelope-inner">
      <div class="envelope-front">
        <div class="stamp"></div>
        <div class="line line1"></div>
        <div class="line line2"></div>
      </div>
      <div class="envelope-back">
        <h2>Мы идём гулять сегодня?</h2>
        <div class="button-group">
          <button class="btn btn-yes" id="btnYes">Да</button>
          <button class="btn btn-no" id="btnNo">Нет</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      const envelope = document.getElementById('envelope');
      const btnNo = document.getElementById('btnNo');
      const btnYes = document.getElementById('btnYes');

      // Сохраняем исходную позицию кнопки "Нет"
      let originalPosition = { left: 'auto', top: 'auto', transform: 'none' };
      let isCollapsed = false;
      let isFlying = false;
      let flyTimeout = null;
      let isReturning = false;

      // Открытие конверта
      envelope.addEventListener('click', function(e) {
        if (e.target.closest('.btn')) return;
        if (envelope.classList.contains('open')) return;
        envelope.classList.add('open');
      });

      // Функция возврата на исходную позицию
      function restoreButton() {
        if (isReturning) return;
        isReturning = true;

        // Убираем все трансформации и позиционирование
        btnNo.classList.remove('flying', 'collapsed', 'restored');
        btnNo.style.transform = '';
        btnNo.style.position = '';
        btnNo.style.left = '';
        btnNo.style.top = '';
        btnNo.style.zIndex = '';
        btnNo.style.pointerEvents = '';

        // Возвращаем в поток
        btnNo.style.display = '';
        
        // Небольшая задержка для плавности
        setTimeout(() => {
          isReturning = false;
          isCollapsed = false;
          isFlying = false;
        }, 100);
      }

      // Функция плавного улетания
      function flyAway(e) {
        if (isCollapsed || isFlying || isReturning) return;

        const rect = btnNo.getBoundingClientRect();
        const mouseX = e.clientX;
        const mouseY = e.clientY;

        // Центр кнопки
        const btnCenterX = rect.left + rect.width / 2;
        const btnCenterY = rect.top + rect.height / 2;

        // Вектор от мыши к центру кнопки
        let dx = btnCenterX - mouseX;
        let dy = btnCenterY - mouseY;

        // Если мышь прямо над кнопкой - улетаем вправо-вниз
        const length = Math.sqrt(dx * dx + dy * dy);
        if (length < 10) {
          dx = 150 + Math.random() * 50;
          dy = 80 + Math.random() * 50;
        }

        // Нормализуем и масштабируем
        const normX = dx / (length || 1);
        const normY = dy / (length || 1);
        const distance = 150 + Math.random() * 100;

        const moveX = normX * distance;
        const moveY = normY * distance;

        // Применяем анимацию полета
        btnNo.classList.add('flying');
        btnNo.style.transform = `translate(${moveX}px, ${moveY}px) scale(1.05)`;
        btnNo.style.transition = 'transform 0.5s cubic-bezier(0.34, 1.2, 0.64, 1), opacity 0.3s ease';

        isFlying = true;

        // Через некоторое время возвращаем в исходное положение, если не кликнули
        if (flyTimeout) clearTimeout(flyTimeout);
        flyTimeout = setTimeout(() => {
          if (!isCollapsed && isFlying) {
            // Возвращаемся на место, если не схлопнулись
            btnNo.classList.remove('flying');
            btnNo.style.transform = '';
            btnNo.style.transition = 'transform 0.4s cubic-bezier(0.34, 1.2, 0.64, 1), opacity 0.3s ease';
            setTimeout(() => {
              isFlying = false;
              btnNo.style.transition = '';
            }, 450);
          }
          flyTimeout = null;
        }, 600);
      }

      // Обработчик наведения мыши - улетает
      btnNo.addEventListener('mouseenter', flyAway);

      // Обработчик движения мыши - если мышь догоняет, улетает дальше
      btnNo.addEventListener('mousemove', function(e) {
        if (isCollapsed || isReturning) return;
        // Если кнопка уже летит, обновляем направление
        if (isFlying) {
          // Прерываем текущий полет и начинаем новый
          if (flyTimeout) {
            clearTimeout(flyTimeout);
            flyTimeout = null;
          }
          // Плавно обновляем позицию
          const rect = btnNo.getBoundingClientRect();
          const mouseX = e.clientX;
          const mouseY = e.clientY;
          
          const btnCenterX = rect.left + rect.width / 2;
          const btnCenterY = rect.top + rect.height / 2;
          
          let dx = btnCenterX - mouseX;
          let dy = btnCenterY - mouseY;
          
          const length = Math.sqrt(dx * dx + dy * dy);
          if (length < 10) {
            dx = 150 + Math.random() * 50;
            dy = 80 + Math.random() * 50;
          }
          
          const normX = dx / (length || 1);
          const normY = dy / (length || 1);
          const distance = 150 + Math.random() * 100;
          
          const moveX = normX * distance;
          const moveY = normY * distance;
          
          btnNo.style.transform = `translate(${moveX}px, ${moveY}px) scale(1.05)`;
          btnNo.style.transition = 'transform 0.3s cubic-bezier(0.34, 1.2, 0.64, 1)';
          
          // Перезапускаем таймер возврата
          if (flyTimeout) clearTimeout(flyTimeout);
          flyTimeout = setTimeout(() => {
            if (!isCollapsed && isFlying) {
              btnNo.classList.remove('flying');
              btnNo.style.transform = '';
              btnNo.style.transition = 'transform 0.4s cubic-bezier(0.34, 1.2, 0.64, 1), opacity 0.3s ease';
              setTimeout(() => {
                isFlying = false;
                btnNo.style.transition = '';
              }, 450);
            }
            flyTimeout = null;
          }, 600);
        }
      });

      // Клик по "Нет" - схлопывание и возврат на исходную позицию
      btnNo.addEventListener('click', function(e) {
        e.stopPropagation();
        
        // Если кнопка уже схлопнута или возвращается - игнорируем
        if (isCollapsed || isReturning) return;

        // Если кнопка летит - прерываем полет
        if (isFlying) {
          if (flyTimeout) {
            clearTimeout(flyTimeout);
            flyTimeout = null;
          }
          btnNo.classList.remove('flying');
          btnNo.style.transform = '';
          btnNo.style.transition = '';
          isFlying = false;
        }

        // Схлопываем
        isCollapsed = true;
        btnNo.classList.add('collapsed');

        // Через время возвращаем на исходную позицию
        setTimeout(() => {
          restoreButton();
          // Добавляем эффект появления
          btnNo.classList.add('restored');
          setTimeout(() => {
            btnNo.classList.remove('restored');
          }, 450);
        }, 350);
      });

      // Кнопка "Да" — обновленное сообщение
      btnYes.addEventListener('click', function(e) {
        e.stopPropagation();
        alert('Ура! ❤️');
      });

      // Сброс состояний при потере мыши
      document.addEventListener('mouseleave', function() {
        if (isFlying && !isCollapsed) {
          if (flyTimeout) {
            clearTimeout(flyTimeout);
            flyTimeout = null;
          }
          btnNo.classList.remove('flying');
          btnNo.style.transform = '';
          btnNo.style.transition = 'transform 0.4s cubic-bezier(0.34, 1.2, 0.64, 1)';
          setTimeout(() => {
            isFlying = false;
            btnNo.style.transition = '';
          }, 450);
        }
      });

    })();
  </script>
</body>
</html>
